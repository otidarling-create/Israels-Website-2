<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Christian Cartoons for Kids</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#6ee7ff,#ffd86e,#7cff8a);
text-align:center;
margin:0;
}

h1{
color:#1e4fd1;
padding:20px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:20px;
}

.video-box{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

iframe{
border-radius:10px;
}

</style>
</head>

<body>

<h1>📺 Christian Cartoons for Kids</h1>
<p>Watch fun Bible cartoons!</p>

<div class="container">

<div class="video-box">
<h3>Jesus Loves Me Cartoon</h3>
<iframe width="350" height="200"
src="https://www.youtube.com/embed/2mgUPt2KI08"
title="Christian Cartoon"
frameborder="0"
allowfullscreen>
</iframe>
</div>

<div class="video-box">
<h3>Noah's Ark Cartoon</h3>
<iframe width="350" height="200"
src="https://www.youtube.com/embed/7_E1hX4yB6o"
title="Noah's Ark"
frameborder="0"
allowfullscreen>
</iframe>
</div>

<div class="video-box">
<h3>David and Goliath</h3>
<iframe width="350" height="200"
src="https://www.youtube.com/embed/v8cJz3j3G5Q"
title="David and Goliath"
frameborder="0"
allowfullscreen>
</iframe>
</div>

<div class="video-box">
<h3>Jonah and the Whale</h3>
<iframe width="350" height="200"
src="https://www.youtube.com/embed/dLIabZc0O4c"
title="Jonah and the Whale"
frameborder="0"
allowfullscreen>
</iframe>
</div>

</div>

</body>
</html>
